<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Safety System (Pro)</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Full Screen Map -->
    <div id="map"></div>

    <!-- Top Left: Search & Controls -->
    <div class="control-panel">
        <button id="toggle-panel-btn">
            <i class="fas fa-chevron-left"></i>
        </button>

        <div class="panel-header">
            <h3><i class="fas fa-shield-alt"></i> Safety Pilot</h3>
            <div id="status-badges">
                <span class="badge" id="gps-badge">GPS: Wait</span>
                <span class="badge" id="speed-badge">0 km/h</span>
                <span class="badge" id="weather-badge"><i class="fas fa-cloud-sun"></i> --</span>
                <span class="badge" id="voice-badge" onclick="enableAudio()">Audio: OFF <i
                        class="fas fa-volume-mute"></i></span>
            </div>
        </div>

        <div class="input-group">
            <label><i class="fas fa-map-pin text-green"></i> Start (Drag Marker)</label>
            <input type="text" id="start-input" placeholder="Drag 'Car' Marker on Map" readonly>
            <button class="icon-btn" onclick="locateUser()" title="Use GPS"><i class="fas fa-crosshairs"></i></button>
        </div>

        <div class="input-group">
            <label><i class="fas fa-flag-checkered text-red"></i> Destination</label>
            <input type="text" id="end-input" placeholder="Type City (e.g. Kandy)">
            <button class="icon-btn primary" onclick="planRoute()"><i class="fas fa-search"></i></button>
        </div>

        <!-- Route Info -->
        <div id="route-stats" class="hidden">
            <div class="stat-box">
                <strong id="dist-val">0 km</strong>
                <small>Distance</small>
            </div>
            <div class="stat-box">
                <strong id="time-val">0 min</strong>
                <small>Time</small>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="actions">
            <button id="btn-sim" class="btn secondary" onclick="startSimulation()" disabled>
                <i class="fas fa-play"></i> Simulate
            </button>
            <button id="btn-drive" class="btn primary" onclick="startRealDrive()" disabled>
                <i class="fas fa-car-side"></i> Start Drive
            </button>
        </div>

        <div id="nav-status" class="hidden">
            <p><i class="fas fa-satellite-dish"></i> <span id="nav-msg">Navigating...</span></p>
            <p id="location-area" class="location-text"><i class="fas fa-map-marker-alt"></i> <span>Initializing
                    GPS...</span></p>
            <button onclick="stopNavigation()" class="btn danger small">Stop</button>
        </div>
    </div>

    <!-- Bottom Alert Toast -->
    <div id="alert-toast" class="hidden">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="alert-msg">Caution: High Risk Zone Ahead!</span>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="script.js"></script>
</body>

</html>
